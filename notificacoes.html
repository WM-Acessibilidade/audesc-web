<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Receber notificações — Audesc</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.5;margin:0;background:#f7f7f7;color:#111}header,main{max-width:1000px;margin:0 auto;padding:20px}.panel,.card{background:#fff;border:1px solid #ddd;border-radius:12px;padding:18px;margin-top:16px}label{display:block;font-weight:700;margin-top:12px}input,select,button{font:inherit}input,select{width:100%;box-sizing:border-box;padding:11px;margin-top:6px;border:1px solid #999;border-radius:8px}button,.button-link{display:inline-block;margin:8px 8px 0 0;padding:11px 14px;border:0;border-radius:8px;cursor:pointer;font-weight:700;background:#111;color:#fff;text-decoration:none}.grid{display:grid;gap:12px;grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}.status{margin-top:12px;padding:10px;border-radius:8px;border:1px solid #aaa;background:#f0f0f0}.success{border-color:#237a3b;background:#e8f6ec}.error{border-color:#a40000;background:#fff0f0}.small{font-size:.95rem;color:#444}.badge{display:inline-block;padding:3px 8px;border-radius:999px;background:#eee;margin-right:6px;font-size:.9rem}.live{border-left:8px solid #237a3b}.live-badge{background:#dff6e8;color:#064d20}.past{opacity:.78}.share button{background:#444}.hidden{display:none}</style></head><body><header><a href="eventos.html">Voltar para eventos</a><h1>Receber notificações</h1></header><main><section class="panel"><form id="formPrefs"><label for="email">E-mail</label><input id="email" name="email" type="email" required><label><input id="receberTodos" type="checkbox"> Receber notificações de todos os eventos publicados</label><div class="grid"><div><label for="pais">País de interesse</label><select id="pais" name="pais"><option value="Brasil" selected>Brasil</option><option value="Angola">Angola</option><option value="Cabo Verde">Cabo Verde</option><option value="Guiné-Bissau">Guiné-Bissau</option><option value="Guiné Equatorial">Guiné Equatorial</option><option value="Moçambique">Moçambique</option><option value="Portugal">Portugal</option><option value="São Tomé e Príncipe">São Tomé e Príncipe</option><option value="Timor-Leste">Timor-Leste</option><option value="Outros">Outros</option></select></div><div><label for="uf" id="ufLabel">Unidade federativa de interesse</label><select id="uf" name="uf"><option value="">Selecione</option></select></div></div><div class="hidden" aria-hidden="true"><label for="website">Não preencha</label><input id="website" name="website" tabindex="-1" autocomplete="off"></div><button id="submitBtn" type="submit">Confirmar notificações</button><div id="status" class="status">Aguardando preenchimento.</div></form></section></main><script>
const API_URL='https://audesc-events-api.onrender.com',SUPABASE_URL='https://xcmeirgmpbiwodkvuaus.supabase.co',SUPABASE_PUBLISHABLE_KEY='sb_publishable_0O38-ahRI_iRA-oyKIaOew_QgWjBpkW';const sb=supabase.createClient(SUPABASE_URL,SUPABASE_PUBLISHABLE_KEY);

const unidadesAdministrativas = {
 Brasil: {
  rotulo: 'Unidade federativa',
  padrao: 'DF',
  opcoes: [['AC','Acre'],['AL','Alagoas'],['AP','Amapá'],['AM','Amazonas'],['BA','Bahia'],['CE','Ceará'],['DF','Distrito Federal'],['ES','Espírito Santo'],['GO','Goiás'],['MA','Maranhão'],['MT','Mato Grosso'],['MS','Mato Grosso do Sul'],['MG','Minas Gerais'],['PA','Pará'],['PB','Paraíba'],['PR','Paraná'],['PE','Pernambuco'],['PI','Piauí'],['RJ','Rio de Janeiro'],['RN','Rio Grande do Norte'],['RS','Rio Grande do Sul'],['RO','Rondônia'],['RR','Roraima'],['SC','Santa Catarina'],['SP','São Paulo'],['SE','Sergipe'],['TO','Tocantins']]
 },
 Angola: { rotulo: 'Província', padrao: '', opcoes: ['Bengo','Benguela','Bié','Cabinda','Cuando Cubango','Cuanza Norte','Cuanza Sul','Cunene','Huambo','Huíla','Luanda','Lunda Norte','Lunda Sul','Malanje','Moxico','Namibe','Uíge','Zaire'] },
 'Cabo Verde': { rotulo: 'Ilha', padrao: '', opcoes: ['Boa Vista','Brava','Fogo','Maio','Sal','Santiago','Santo Antão','São Nicolau','São Vicente'] },
 'Guiné-Bissau': { rotulo: 'Região', padrao: '', opcoes: ['Bafatá','Biombo','Bolama/Bijagós','Cacheu','Gabú','Oio','Quinara','Tombali','Setor Autônomo de Bissau'] },
 'Guiné Equatorial': { rotulo: 'Província', padrao: '', opcoes: ['Annobón','Bioko Norte','Bioko Sul','Centro Sul','Djibloho','Kie-Ntem','Litoral','Wele-Nzas'] },
 Moçambique: { rotulo: 'Província', padrao: '', opcoes: ['Cabo Delgado','Gaza','Inhambane','Manica','Maputo','Maputo Cidade','Nampula','Niassa','Sofala','Tete','Zambézia'] },
 Portugal: { rotulo: 'Distrito ou região autônoma', padrao: '', opcoes: ['Aveiro','Beja','Braga','Bragança','Castelo Branco','Coimbra','Évora','Faro','Guarda','Leiria','Lisboa','Portalegre','Porto','Santarém','Setúbal','Viana do Castelo','Vila Real','Viseu','Açores','Madeira'] },
 'São Tomé e Príncipe': { rotulo: 'Distrito ou região autônoma', padrao: '', opcoes: ['Água Grande','Cantagalo','Caué','Lembá','Lobata','Mé-Zóchi','Região Autônoma do Príncipe'] },
 'Timor-Leste': { rotulo: 'Município ou região administrativa especial', padrao: '', opcoes: ['Aileu','Ainaro','Ataúro','Baucau','Bobonaro','Covalima','Díli','Ermera','Lautém','Liquiçá','Manatuto','Manufahi','Oecusse','Viqueque'] }
};
function criarOpcao(valor,texto){const opt=document.createElement('option');opt.value=valor;opt.textContent=texto||valor;return opt}
function preencherUnidadeAdministrativa(paisSelect, localSelect, labelEl){
 const dados=unidadesAdministrativas[paisSelect.value];
 localSelect.innerHTML='';
 localSelect.appendChild(criarOpcao('','Selecione'));
 if(dados){
  if(labelEl) labelEl.textContent=dados.rotulo;
  dados.opcoes.forEach(item=>{
   if(Array.isArray(item)) localSelect.appendChild(criarOpcao(item[0], item[1]+' ('+item[0]+')'));
   else localSelect.appendChild(criarOpcao(item,item));
  });
  localSelect.disabled=false;
  localSelect.value=dados.padrao||'';
 }else{
  if(labelEl) labelEl.textContent='Local';
  localSelect.value='';
  localSelect.disabled=true;
 }
}

function st(m,c){const el=document.getElementById('status');el.textContent=m;el.className='status'+(c?' '+c:'')}
const paisPreferencia=document.getElementById('pais'),ufPreferencia=document.getElementById('uf'),ufLabel=document.getElementById('ufLabel');
function atualizarPreferenciaLocal(){preencherUnidadeAdministrativa(paisPreferencia,ufPreferencia,ufLabel)}
paisPreferencia.addEventListener('change',atualizarPreferenciaLocal);
atualizarPreferenciaLocal();
document.getElementById('formPrefs').onsubmit=async(e)=>{e.preventDefault();const btn=document.getElementById('submitBtn');btn.disabled=true;st('Salvando preferências...','');const data=Object.fromEntries(new FormData(e.target).entries());data.receber_todos=document.getElementById('receberTodos').checked;try{const r=await fetch(API_URL+'/notificacoes/solicitar',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});const j=await r.json();if(!r.ok)throw new Error(j.error);if(j.ja_validado)st('E-mail já validado. Suas preferências foram atualizadas com sucesso.','success');else{const {error}=await sb.auth.signInWithOtp({email:data.email,options:{emailRedirectTo:location.origin+location.pathname.replace('notificacoes.html','notificacoes-confirmadas.html')}});if(error)throw error;st('Enviamos um link de validação para seu e-mail. Clique nele para ativar as notificações.','success')}}catch(err){st('Erro: '+(err.message||'não foi possível salvar.'),'error')}finally{btn.disabled=false}};
</script></body></html>
