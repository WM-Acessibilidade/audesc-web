<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Eventos com audiodescrição — Audesc</title><style>body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.5;margin:0;background:#f7f7f7;color:#111}header,main{max-width:1000px;margin:0 auto;padding:20px}.panel,.card{background:#fff;border:1px solid #ddd;border-radius:12px;padding:18px;margin-top:16px}label{display:block;font-weight:700;margin-top:12px}input,select,button{font:inherit}input,select{width:100%;box-sizing:border-box;padding:11px;margin-top:6px;border:1px solid #999;border-radius:8px}button,.button-link{display:inline-block;margin:8px 8px 0 0;padding:11px 14px;border:0;border-radius:8px;cursor:pointer;font-weight:700;background:#111;color:#fff;text-decoration:none}.grid{display:grid;gap:12px;grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}.status{margin-top:12px;padding:10px;border-radius:8px;border:1px solid #aaa;background:#f0f0f0}.success{border-color:#237a3b;background:#e8f6ec}.error{border-color:#a40000;background:#fff0f0}.small{font-size:.95rem;color:#444}.badge{display:inline-block;padding:3px 8px;border-radius:999px;background:#eee;margin-right:6px;font-size:.9rem}.live{border-left:8px solid #237a3b}.live-badge{background:#dff6e8;color:#064d20}.past{opacity:.78}.share button{background:#444}.hidden{display:none}</style></head><body><header><a href="index.html">Voltar</a><h1>Eventos com audiodescrição</h1><p>Encontre eventos acessíveis, filtre por região e compartilhe publicações.</p></header><main><section class="panel"><h2>Receber notificações</h2><p><a class="button-link" href="notificacoes.html">Cadastrar e-mail para receber notificações de novos eventos acessíveis</a></p></section><section class="panel"><h2>Buscar eventos</h2><div class="grid"><div><label for="busca">Campo de busca</label><input id="busca" type="search" placeholder="Digite nome, descrição ou local"></div><div><label for="paisFiltro">País</label><select id="paisFiltro"><option value="Brasil" selected>Brasil</option><option value="Angola">Angola</option><option value="Cabo Verde">Cabo Verde</option><option value="Guiné-Bissau">Guiné-Bissau</option><option value="Guiné Equatorial">Guiné Equatorial</option><option value="Moçambique">Moçambique</option><option value="Portugal">Portugal</option><option value="São Tomé e Príncipe">São Tomé e Príncipe</option><option value="Timor-Leste">Timor-Leste</option><option value="Outros">Outros</option></select></div><div><label for="ufFiltro" id="ufFiltroLabel">Unidade federativa</label><select id="ufFiltro"><option value="">Selecione</option></select></div></div><div id="summary" class="status">Carregando eventos.</div></section><section class="panel"><h2>Ao vivo agora</h2><div id="listaLive"></div></section><section class="panel"><h2>Próximos eventos</h2><div id="listaProximos"></div></section><section class="panel"><h2>Eventos anteriores</h2><div id="listaAnteriores"></div></section></main><script>
const API_URL='https://audesc-events-api.onrender.com';let eventos=[];

const unidadesAdministrativas = {
 Brasil: {
  rotulo: 'Unidade federativa',
  padrao: 'DF',
  opcoes: [['AC','Acre'],['AL','Alagoas'],['AP','Amapá'],['AM','Amazonas'],['BA','Bahia'],['CE','Ceará'],['DF','Distrito Federal'],['ES','Espírito Santo'],['GO','Goiás'],['MA','Maranhão'],['MT','Mato Grosso'],['MS','Mato Grosso do Sul'],['MG','Minas Gerais'],['PA','Pará'],['PB','Paraíba'],['PR','Paraná'],['PE','Pernambuco'],['PI','Piauí'],['RJ','Rio de Janeiro'],['RN','Rio Grande do Norte'],['RS','Rio Grande do Sul'],['RO','Rondônia'],['RR','Roraima'],['SC','Santa Catarina'],['SP','São Paulo'],['SE','Sergipe'],['TO','Tocantins']]
 },
 Angola: { rotulo: 'Província', padrao: '', opcoes: ['Bengo','Benguela','Bié','Cabinda','Cuando Cubango','Cuanza Norte','Cuanza Sul','Cunene','Huambo','Huíla','Luanda','Lunda Norte','Lunda Sul','Malanje','Moxico','Namibe','Uíge','Zaire'] },
 'Cabo Verde': { rotulo: 'Ilha', padrao: '', opcoes: ['Boa Vista','Brava','Fogo','Maio','Sal','Santiago','Santo Antão','São Nicolau','São Vicente'] },
 'Guiné-Bissau': { rotulo: 'Região', padrao: '', opcoes: ['Bafatá','Biombo','Bolama/Bijagós','Cacheu','Gabú','Oio','Quinara','Tombali','Setor Autônomo de Bissau'] },
 'Guiné Equatorial': { rotulo: 'Província', padrao: '', opcoes: ['Annobón','Bioko Norte','Bioko Sul','Centro Sul','Djibloho','Kie-Ntem','Litoral','Wele-Nzas'] },
 Moçambique: { rotulo: 'Província', padrao: '', opcoes: ['Cabo Delgado','Gaza','Inhambane','Manica','Maputo','Maputo Cidade','Nampula','Niassa','Sofala','Tete','Zambézia'] },
 Portugal: { rotulo: 'Distrito ou região autônoma', padrao: '', opcoes: ['Aveiro','Beja','Braga','Bragança','Castelo Branco','Coimbra','Évora','Faro','Guarda','Leiria','Lisboa','Portalegre','Porto','Santarém','Setúbal','Viana do Castelo','Vila Real','Viseu','Açores','Madeira'] },
 'São Tomé e Príncipe': { rotulo: 'Distrito ou região autônoma', padrao: '', opcoes: ['Água Grande','Cantagalo','Caué','Lembá','Lobata','Mé-Zóchi','Região Autônoma do Príncipe'] },
 'Timor-Leste': { rotulo: 'Município ou região administrativa especial', padrao: '', opcoes: ['Aileu','Ainaro','Ataúro','Baucau','Bobonaro','Covalima','Díli','Ermera','Lautém','Liquiçá','Manatuto','Manufahi','Oecusse','Viqueque'] }
};
function criarOpcao(valor,texto){const opt=document.createElement('option');opt.value=valor;opt.textContent=texto||valor;return opt}
function preencherUnidadeAdministrativa(paisSelect, localSelect, labelEl){
 const dados=unidadesAdministrativas[paisSelect.value];
 localSelect.innerHTML='';
 localSelect.appendChild(criarOpcao('','Selecione'));
 if(dados){
  if(labelEl) labelEl.textContent=dados.rotulo;
  dados.opcoes.forEach(item=>{
   if(Array.isArray(item)) localSelect.appendChild(criarOpcao(item[0], item[1]+' ('+item[0]+')'));
   else localSelect.appendChild(criarOpcao(item,item));
  });
  localSelect.disabled=false;
  localSelect.value=dados.padrao||'';
 }else{
  if(labelEl) labelEl.textContent='Local';
  localSelect.value='';
  localSelect.disabled=true;
 }
}

function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function fmt(v){return v?new Date(v).toLocaleString('pt-BR'):''}
function isLive(e){if(!e.data_evento||!e.duracao_horas)return false;const st=new Date(e.data_evento).getTime(),end=st+Number(e.duracao_horas)*3600000,now=Date.now();return now>=st&&now<=end}
function isPast(e){if(!e.data_evento||!e.duracao_horas)return false;return Date.now()>new Date(e.data_evento).getTime()+Number(e.duracao_horas)*3600000}
function url(e){return location.origin+location.pathname+'?evento='+encodeURIComponent(e.id)}function wa(t,u){window.open('https://api.whatsapp.com/send?text='+t+'%20'+u,'_blank')}function fb(u){window.open('https://www.facebook.com/sharer/sharer.php?u='+u,'_blank')}function tw(t,u){window.open('https://twitter.com/intent/tweet?text='+t+'&url='+u,'_blank')}function li(u){window.open('https://www.linkedin.com/sharing/share-offsite/?url='+u,'_blank')}async function copy(u){try{await navigator.clipboard.writeText(u);alert('Link copiado.')}catch(e){prompt('Copie o link:',u)}}
function card(e){const d=document.createElement('article');d.className='card '+(isLive(e)?'live':isPast(e)?'past':'');const title=e.titulo_publicado||e.titulo_original||'Evento sem título',u=url(e),r=e.sala_codigo?'live/receber.html?sala='+encodeURIComponent(e.sala_codigo):'';d.innerHTML=`<h3>${esc(title)}</h3><p>${isLive(e)?'<span class="badge live-badge">AO VIVO</span>':''}<span class="badge">${isPast(e)?'Encerrado':'Próximo ou disponível'}</span></p><p class="small">${esc(e.descricao_publicada||e.descricao_original||'')}</p><p><strong>Local:</strong> ${esc(e.pais||'')} ${e.uf?'- '+esc(e.uf):''}</p><p><strong>Data:</strong> ${esc(fmt(e.data_evento))}</p><p>${r?`<a class="button-link" href="${r}">Entrar como ouvinte</a>`:'<span class="small">Evento apenas para divulgação.</span>'}</p><div class="share"><strong>Compartilhar:</strong><br><button onclick="wa('${encodeURIComponent(title)}','${encodeURIComponent(u)}')">WhatsApp</button><button onclick="fb('${encodeURIComponent(u)}')">Facebook</button><button onclick="tw('${encodeURIComponent(title)}','${encodeURIComponent(u)}')">X</button><button onclick="li('${encodeURIComponent(u)}')">LinkedIn</button><button onclick="copy('${u}')">Copiar link</button></div>`;return d}
function filtered(){const q=document.getElementById('busca').value.toLowerCase().trim(),p=document.getElementById('paisFiltro').value,uf=document.getElementById('ufFiltro').value;return eventos.filter(e=>{const h=[e.titulo_publicado,e.titulo_original,e.descricao_publicada,e.descricao_original,e.pais,e.uf].join(' ').toLowerCase();return(!q||h.includes(q))&&(!p||e.pais===p)&&(!uf||e.uf===uf)})}
function render(){const fs=filtered(),live=fs.filter(isLive).sort((a,b)=>new Date(b.data_evento||0)-new Date(a.data_evento||0)),prox=fs.filter(e=>!isLive(e)&&!isPast(e)).sort((a,b)=>new Date(a.data_evento||'2999-01-01')-new Date(b.data_evento||'2999-01-01')),ant=fs.filter(isPast).sort((a,b)=>new Date(b.data_evento||0)-new Date(a.data_evento||0));const futuros = fs.filter(e=>!isLive(e)&&!isPast(e));
document.getElementById('summary').textContent=`Total de eventos: ${fs.length}. Futuros: ${futuros.length}. Ao vivo: ${live.length}.`;[['listaLive',live],['listaProximos',prox],['listaAnteriores',ant]].forEach(([id,arr])=>{const el=document.getElementById(id);el.innerHTML='';if(!arr.length){el.innerHTML='<p>Nenhum evento nesta seção.</p>';return}arr.forEach(e=>el.appendChild(card(e)))})}
async function load(){try{const r=await fetch(API_URL+'/public/eventos'),j=await r.json();if(!r.ok)throw new Error(j.error);eventos=j.eventos||[];render()}catch(e){document.getElementById('summary').textContent='Erro: '+e.message}}
document.getElementById('busca').addEventListener('input',render);const paisFiltro=document.getElementById('paisFiltro'),ufFiltro=document.getElementById('ufFiltro'),ufFiltroLabel=document.getElementById('ufFiltroLabel');
function atualizarFiltroLocal(){preencherUnidadeAdministrativa(paisFiltro,ufFiltro,ufFiltroLabel);render()}
paisFiltro.addEventListener('change',atualizarFiltroLocal);
ufFiltro.addEventListener('change',render);
preencherUnidadeAdministrativa(paisFiltro,ufFiltro,ufFiltroLabel);
load();
</script></body></html>
