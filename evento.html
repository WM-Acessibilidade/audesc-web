<!doctype html>
<html lang="pt-BR">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Evento — Audesc</title><style>body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.5;margin:0;background:#f7f7f7;color:#111}header,main{max-width:1000px;margin:0 auto;padding:20px}.panel,.card{background:#fff;border:1px solid #ddd;border-radius:12px;padding:18px;margin-top:16px}label{display:block;font-weight:700;margin-top:12px}input,select,button{font:inherit}input,select{width:100%;box-sizing:border-box;padding:11px;margin-top:6px;border:1px solid #999;border-radius:8px}button,.button-link{display:inline-block;margin:8px 8px 0 0;padding:11px 14px;border:0;border-radius:8px;cursor:pointer;font-weight:700;background:#111;color:#fff;text-decoration:none}.grid{display:grid;gap:12px;grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}.status{margin-top:12px;padding:10px;border-radius:8px;border:1px solid #aaa;background:#f0f0f0}.event-list{list-style:none;padding-left:0}.event-list li{padding:12px 0;border-bottom:1px solid #ddd}.event-list a{font-weight:700}.small{font-size:.95rem;color:#444}.badge{display:inline-block;padding:3px 8px;border-radius:999px;background:#eee;margin-right:6px;font-size:.9rem}.live-badge{background:#dff6e8;color:#064d20}.hidden{display:none}.share button{background:#444}</style></head>
<body><header><a id="voltarEventos" href="eventos.html">Voltar para eventos</a><h1 id="titulo">Evento</h1></header><main><div id="status" class="status">Carregando evento.</div><article id="conteudo" class="panel hidden"></article></main>
<script>
const API_URL='https://audesc-events-api.onrender.com';
function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function fmt(v){return v?new Date(v).toLocaleString('pt-BR'):''}
function shareUrl(){return location.href}
function configurarVoltar(){
 const params=new URLSearchParams(location.search);
 const id=params.get('id')||'';
 const retorno=params.get('retorno')||id;
 const voltar=new URLSearchParams();
 ['pais','uf','busca'].forEach(k=>{const v=params.get(k);if(v)voltar.set(k,v)});
 if(retorno)voltar.set('retorno',retorno);
 if(retorno)sessionStorage.setItem('audesc_ultimo_evento',retorno);
 const href='eventos.html'+(voltar.toString()?'?'+voltar.toString():'');
 const link=document.getElementById('voltarEventos');
 if(link)link.href=href;
}
function wa(t,u){window.open('https://api.whatsapp.com/send?text='+encodeURIComponent(t+' '+u),'_blank')}function fb(u){window.open('https://www.facebook.com/sharer/sharer.php?u='+encodeURIComponent(u),'_blank')}function tw(t,u){window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(t)+'&url='+encodeURIComponent(u),'_blank')}function li(u){window.open('https://www.linkedin.com/sharing/share-offsite/?url='+encodeURIComponent(u),'_blank')}async function copy(u){try{await navigator.clipboard.writeText(u);alert('Link copiado.')}catch(e){prompt('Copie o link:',u)}}
function mapaUrl(e){const lat=Number(e.latitude),lon=Number(e.longitude);if(Number.isFinite(lat)&&Number.isFinite(lon))return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(lat+','+lon);if(e.local_evento)return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(e.local_evento);return ''}
function linkLine(label,url){return url?`<p><a class="button-link" href="${esc(url)}">${label}</a></p>`:''}
function render(e){const title=e.titulo_publicado||e.titulo_original||'Evento sem título';document.title=title+' — Audesc';document.getElementById('titulo').textContent=title;const u=shareUrl();const r=(e.divulgar_acesso_ouvintes&&e.sala_codigo)?'live/receber.html?sala='+encodeURIComponent(e.sala_codigo):'';document.getElementById('status').classList.add('hidden');const el=document.getElementById('conteudo');el.classList.remove('hidden');el.innerHTML=`<h2>${esc(title)}</h2><p><strong>Data:</strong> ${esc(fmt(e.data_evento))}</p>${ev.categoria_evento?`<p><strong>Categoria:</strong> ${esc(window.AUDESC_CATEGORIAS_EVENTO?.nome(ev.categoria_evento)||ev.categoria_evento)}</p>`:''}<p><strong>Local:</strong> ${esc(e.local_evento||'')}${e.local_evento?' — ':''}${esc(e.pais||'')}${e.uf?' - '+esc(e.uf):''}</p>${mapaUrl(e)?`<p><a class="button-link" href="${mapaUrl(e)}" target="_blank" rel="noopener">Abrir rota até o local</a></p>`:''}<h2>Descrição</h2><p>${esc(e.descricao_publicada||e.descricao_original||'')}</p>${linkLine('Site oficial',e.site_oficial)}${linkLine('Ingressos',e.link_ingressos)}${linkLine('Inscrição',e.link_inscricao)}${linkLine('Programação',e.link_programacao)}${linkLine('Informações de acessibilidade',e.link_acessibilidade)}${r?`<p><a class="button-link" href="${r}">Entrar como ouvinte</a></p>`:''}<div class="share"><h2>Compartilhar</h2><button onclick="wa('${esc(title)}','${u}')">WhatsApp</button><button onclick="fb('${u}')">Facebook</button><button onclick="tw('${esc(title)}','${u}')">X</button><button onclick="li('${u}')">LinkedIn</button><button onclick="copy('${u}')">Copiar link</button></div>`}
async function load(){const id=new URLSearchParams(location.search).get('id');if(!id){document.getElementById('status').textContent='Evento não informado.';return}try{const r=await fetch(API_URL+'/public/eventos'),j=await r.json();if(!r.ok)throw new Error(j.error);const e=(j.eventos||[]).find(x=>x.id===id);if(!e){document.getElementById('status').textContent='Evento não encontrado.';return}render(e)}catch(e){document.getElementById('status').textContent='Erro: '+e.message}}
configurarVoltar();
load();
</script></body></html>
