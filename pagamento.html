<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Audesc - Pagamento</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>
<style>
body{font-family:Arial,sans-serif;max-width:900px;margin:0 auto;padding:20px;line-height:1.5}
button{padding:12px 16px;font-size:1rem;cursor:pointer;border-radius:8px;border:1px solid #333;background:#111;color:#fff} input{font:inherit;padding:10px;border:1px solid #999;border-radius:8px;box-sizing:border-box;width:100%;max-width:320px}
.card{border:1px solid #ccc;border-radius:10px;padding:18px;margin:16px 0;background:#fff}
.msg{padding:12px;border:1px solid #ccc;border-radius:8px;background:#f6f6f6;margin:16px 0}
.success{border-color:#237a3b;background:#e8f6ec}.error{border-color:#a40000;background:#fff0f0}
</style>
</head>
<body>
<h1>Pagamento do evento</h1>
<p><a href="meus-eventos.html">Voltar para Meus Eventos</a></p>
<div id="status" class="msg">Carregando dados do evento...</div>
<div id="conteudo"></div>
<script>
const API='https://audesc-events-api.onrender.com';
const SUPABASE_URL='https://xcmeirgmpbiwodkvuaus.supabase.co';
const SUPABASE_PUBLISHABLE_KEY='sb_publishable_0O38-ahRI_iRA-oyKIaOew_QgWjBpkW';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_PUBLISHABLE_KEY);
const SESSION_MAX_MINUTES=120;
let eventoAtual=null,paddleInicializado=false,pagamentoIniciado=false,monitoramentoPagamento=false,calculoAtual=null;
function t(v){return v||'—'}
function setMsg(msg,cls){const el=document.getElementById('status');el.textContent=msg;el.className='msg'+(cls?' '+cls:'')}
function sessionAgeMinutes(session){const raw=session?.user?.last_sign_in_at||session?.created_at||session?.expires_at;if(!raw)return 999999;const base=new Date(raw).getTime();if(!base||Number.isNaN(base))return 999999;return (Date.now()-base)/60000}
async function inicializarPaddle(){if(paddleInicializado)return;const r=await fetch(API+'/pagamentos/paddle/config');const cfg=await r.json();if(!r.ok)throw new Error(cfg.error||'Não foi possível carregar configuração do Paddle.');if(cfg.environment==='sandbox')Paddle.Environment.set('sandbox');Paddle.Initialize({
 token:cfg.client_token,
 checkout:{
  settings:{displayMode:'overlay',theme:'light',locale:'pt'},
  events:{
   completed:async function(){ await acompanharConfirmacaoPagamento(); },
   closed:async function(){ await acompanharConfirmacaoPagamento(); }
  }
 }
});paddleInicializado=true}
async function abrirCheckoutPaddle(transactionId){await inicializarPaddle();Paddle.Checkout.open({transactionId})}

const SERVICOS_COM_AGENDA = ['audesc_com_audiodescritor','somente_audiodescritor','somente_consultor'];
function requerAgendaProfissional(ev){return SERVICOS_COM_AGENDA.includes(String(ev?.tipo_servico||'').trim())}
function statusAgendaEvento(ev){return requerAgendaProfissional(ev)?String(ev?.status_agenda||'pendente').trim():'nao_aplicavel'}
function mensagemAgenda(ev){
 const status=statusAgendaEvento(ev);
 if(status==='indisponivel') return 'Impossibilidade do serviço - profissional indisponível.';
 if(status==='disponivel') return 'Disponibilidade de agenda confirmada.';
 return 'Verificando disponibilidade de agenda.';
}
function pagamentoBloqueadoPorAgenda(ev){return requerAgendaProfissional(ev)&&statusAgendaEvento(ev)!=='disponivel'}
function paisPagamento(ev){
 const pais=String(ev?.pais||'').trim();
 if(pais.toLowerCase()==='internacional'&&ev?.origem_transmissao) return String(ev.origem_transmissao||'').trim();
 return pais;
}
function gatewayPagamento(ev){
 return paisPagamento(ev).toLowerCase()==='brasil' ? 'mercadopago' : 'paddle';
}

function moedaSimbolo(m){return m==='BRL'?'R$':(m==='EUR'?'€':'US$')}
function formatarMoeda(valor, moeda){
 try{return new Intl.NumberFormat('pt-BR',{style:'currency',currency:moeda}).format(Number(valor||0))}
 catch(e){return moedaSimbolo(moeda)+' '+Number(valor||0).toFixed(2)}
}

async function calcularPagamento(cupom=''){
 const {data}=await sb.auth.getSession();
 const session=data?.session;
 if(!session||!eventoAtual) return null;
 const url=API+'/pagamentos/calcular/'+encodeURIComponent(eventoAtual.id)+(cupom?'?cupom='+encodeURIComponent(cupom):'');
 const r=await fetch(url,{headers:{'Authorization':'Bearer '+session.access_token}});
 const dataCalc=await r.json();
 if(!r.ok) throw new Error(dataCalc.error||'Erro ao calcular pagamento.');
 calculoAtual=dataCalc.calculo;
 return calculoAtual;
}

async function aplicarCupom(){
 const input=document.getElementById('cupomInput');
 const cupom=(input?.value||'').trim();
 try{
  await calcularPagamento(cupom);
  renderEvento(eventoAtual);
  setMsg(cupom?'Cupom aplicado com sucesso.':'Cupom removido.', 'success');
 }catch(e){
  setMsg('Cupom inválido: '+(e.message||'não foi possível aplicar.'),'error');
 }
}

function transactionIdDaUrl(url){try{const u=new URL(url,location.href);return u.searchParams.get('_ptxn')}catch(e){return null}}

async function buscarEventoAtualizado(){
 const id=new URLSearchParams(location.search).get('evento');
 const {data}=await sb.auth.getSession();
 const session=data?.session;
 if(!id||!session) return null;
 const r=await fetch(API+'/meus-eventos/'+encodeURIComponent(id),{headers:{'Authorization':'Bearer '+session.access_token}});
 const dataEvento=await r.json();
 if(!r.ok) return null;
 return dataEvento.evento;
}

async function acompanharConfirmacaoPagamento(){
 if(monitoramentoPagamento) return;
 monitoramentoPagamento=true;
 setMsg('Pagamento iniciado. Aguardando confirmação automática do evento...', '');
 for(let i=0;i<12;i++){
  await new Promise(resolve=>setTimeout(resolve,5000));
  const ev=await buscarEventoAtualizado();
  if(ev){
   eventoAtual=ev;
   if(ev.status_pagamento==='pago'){
    renderEvento(ev);
    setMsg('Pagamento confirmado. Os dados do evento foram atualizados.', 'success');
    return;
   }
  }
 }
 setMsg('Pagamento realizado, mas a confirmação ainda está sendo processada. Aguarde alguns instantes ou volte para Meus Eventos.', '');
}

async function carregar(){const id=new URLSearchParams(location.search).get('evento');if(!id){setMsg('Evento não informado.','error');return}const {data}=await sb.auth.getSession();const session=data?.session;if(!session||sessionAgeMinutes(session)>SESSION_MAX_MINUTES){await sb.auth.signOut();setMsg('Por segurança, acesse novamente a página Meus Eventos e solicite um novo link de validação.','error');return}try{const r=await fetch(API+'/meus-eventos/'+encodeURIComponent(id),{headers:{'Authorization':'Bearer '+session.access_token}});const data=await r.json();if(!r.ok)throw new Error(data.error||'Erro ao carregar evento.');eventoAtual=data.evento;if(!pagamentoBloqueadoPorAgenda(eventoAtual)){await calcularPagamento();}renderEvento(eventoAtual);setMsg(pagamentoBloqueadoPorAgenda(eventoAtual)?mensagemAgenda(eventoAtual):'Confira os dados do evento e prossiga para o pagamento.','');const tx=new URLSearchParams(location.search).get('_ptxn');if(tx){setMsg('Abrindo checkout do Paddle...','');await abrirCheckoutPaddle(tx);history.replaceState({},document.title,'pagamento.html?evento='+encodeURIComponent(id))}}catch(e){setMsg('Erro: '+(e.message||'não foi possível carregar o evento.'),'error')}}
function renderEvento(ev){
 const pago=ev.status_pagamento==='pago';
 const agendaBloqueada=pagamentoBloqueadoPorAgenda(ev);

 document.getElementById('conteudo').innerHTML=`
 <section class="card">
  <h2>${t(ev.titulo_publicado||ev.titulo_original)}</h2>
  <p><strong>Status do pagamento:</strong> ${t(ev.status_pagamento)}</p>
  <p><strong>Status da publicação:</strong> ${t(ev.status_publicacao)}</p>
  <p><strong>Status da operação:</strong> ${t(ev.status_operacao)}</p>
  <p><strong>Tipo:</strong> ${t(ev.tipo_servico)}</p>
  ${requerAgendaProfissional(ev)?`<p><strong>Status da agenda:</strong> ${mensagemAgenda(ev)}</p>`:''}
  <p><strong>Data:</strong> ${t(ev.data_evento?new Date(ev.data_evento).toLocaleString('pt-BR'):'')}</p>
  <p><strong>País:</strong> ${t(ev.pais)}</p>
  ${ev.pais==='Internacional'?`<p><strong>Origem da transmissão:</strong> ${t(ev.origem_transmissao)}</p>`:''}
  <p><strong>Unidade administrativa:</strong> ${t(ev.uf)}</p>
  <p><strong>Sala:</strong> ${t(ev.sala_codigo)}</p>
  <p><strong>Senha do transmissor:</strong> ${t(ev.senha_transmissor)}</p>
  <p><strong>Gateway de pagamento:</strong> ${gatewayPagamento(ev)==='mercadopago'?'Mercado Pago / PIX e cartões no Brasil':'Paddle / pagamento internacional'}</p>
  ${calculoAtual?`
  <p><strong>Pacote:</strong> ${calculoAtual.pacote.ouvintes?calculoAtual.pacote.ouvintes+' ouvintes por ':''}${calculoAtual.pacote.duracao_horas} hora(s)</p>
  ${calculoAtual.pacote.detalhes?.valor_audesc!==undefined?`<p><strong>Transmissão Audesc:</strong> ${formatarMoeda(calculoAtual.pacote.detalhes.valor_audesc, calculoAtual.moeda)}</p>`:''}
  ${calculoAtual.pacote.detalhes?.valor_audiodescritor!==undefined?`<p><strong>Audiodescritor:</strong> ${formatarMoeda(calculoAtual.pacote.detalhes.valor_audiodescritor, calculoAtual.moeda)}</p>`:''}
  ${calculoAtual.pacote.detalhes?.valor_hora!==undefined?`<p><strong>Valor por hora:</strong> ${formatarMoeda(calculoAtual.pacote.detalhes.valor_hora, calculoAtual.moeda)}</p>`:''}
  <p><strong>Valor original:</strong> ${formatarMoeda(calculoAtual.valor_original, calculoAtual.moeda)}</p>
  <p><strong>Desconto:</strong> ${formatarMoeda(calculoAtual.desconto_aplicado, calculoAtual.moeda)}</p>
  <p><strong>Valor final:</strong> ${formatarMoeda(calculoAtual.valor_final, calculoAtual.moeda)}</p>
  `:''}
  ${pago?'<p class="msg success">Pagamento confirmado. Os dados do evento estão atualizados.</p>':(agendaBloqueada?`
  <div class="msg">
   <p><strong>${mensagemAgenda(ev)}</strong></p>
   <p>O pagamento ficará disponível somente após confirmação da agenda profissional pela administração do Audesc.</p>
  </div>`:`
  <div class="msg">
   <label for="cupomInput"><strong>Código promocional</strong></label><br>
   <input id="cupomInput" type="text" value="${calculoAtual?.cupom_codigo||''}" placeholder="Digite o cupom, se houver">
   <br>
   <button type="button" onclick="aplicarCupom()">Aplicar cupom</button>
   <button type="button" onclick="pagar()">Pagar agora</button>
  </div>`)}
 </section>`;

 if(!pago){
   pagamentoIniciado=false;
 }
}
async function pagar(){
 const {data}=await sb.auth.getSession();
 const session=data?.session;
 if(!session||sessionAgeMinutes(session)>SESSION_MAX_MINUTES){
  await sb.auth.signOut();
  setMsg('Por segurança, acesse novamente Meus Eventos e solicite um novo link antes de pagar.','error');
  return;
 }

 if(pagamentoBloqueadoPorAgenda(eventoAtual)){setMsg(mensagemAgenda(eventoAtual),'');return;}
 const gateway = gatewayPagamento(eventoAtual);
 const cupomAtual=(document.getElementById('cupomInput')?.value||calculoAtual?.cupom_codigo||'').trim();
 try{ await calcularPagamento(cupomAtual); }catch(e){ setMsg('Cupom inválido: '+(e.message||'não foi possível aplicar.'),'error'); return; }

 if(gateway === 'mercadopago'){
  setMsg('Criando pagamento seguro no Mercado Pago...', '');
  try{
   const r=await fetch(API+'/pagamentos/mercadopago/criar-preferencia',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+session.access_token},
    body:JSON.stringify({evento_id:eventoAtual.id,cupom:cupomAtual})
   });
   const data=await r.json();
   if(!r.ok)throw new Error(data.error||'Erro ao criar pagamento Mercado Pago.');

   if(data.ja_pago){
    setMsg('Este evento já está marcado como pago.','success');
    eventoAtual.status_pagamento='pago';
    renderEvento(eventoAtual);
    return;
   }

   if(!data.checkout_url) throw new Error('O Mercado Pago não retornou o link de pagamento.');

   setMsg('Redirecionando para o Mercado Pago. Após o pagamento, você voltará para esta página.', '');
   window.location.href = data.checkout_url;
   return;
  }catch(e){
   setMsg('Erro ao iniciar pagamento no Mercado Pago: '+(e.message||'falha desconhecida.'),'error');
   return;
  }
 }

 setMsg('Criando pagamento seguro no Paddle...', '');
 try{
  const r=await fetch(API+'/pagamentos/paddle/criar-transacao',{
   method:'POST',
   headers:{'Content-Type':'application/json','Authorization':'Bearer '+session.access_token},
   body:JSON.stringify({evento_id:eventoAtual.id,cupom:cupomAtual})
  });
  const data=await r.json();
  if(!r.ok)throw new Error(data.error||'Erro ao criar pagamento.');

  if(data.ja_pago){
   setMsg('Este evento já está marcado como pago.','success');
   eventoAtual.status_pagamento='pago';
   renderEvento(eventoAtual);
   return;
  }

  const txId=data.transaction?.id||transactionIdDaUrl(data.checkout_url||data.transaction?.checkout?.url);
  if(!txId)throw new Error('O Paddle não retornou o identificador da transação.');
  await abrirCheckoutPaddle(txId);
  acompanharConfirmacaoPagamento();
 }catch(e){
  setMsg('Erro ao iniciar pagamento: '+(e.message||'falha desconhecida.'),'error');
 }
}
carregar();
</script>
</body>
</html>
