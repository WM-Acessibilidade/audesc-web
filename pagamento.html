<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Audesc - Pagamento</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>
<style>
body{font-family:Arial,sans-serif;max-width:900px;margin:0 auto;padding:20px;line-height:1.5}
button{padding:12px 16px;font-size:1rem;cursor:pointer;border-radius:8px;border:1px solid #333;background:#111;color:#fff}
.card{border:1px solid #ccc;border-radius:10px;padding:18px;margin:16px 0;background:#fff}
.msg{padding:12px;border:1px solid #ccc;border-radius:8px;background:#f6f6f6;margin:16px 0}
.success{border-color:#237a3b;background:#e8f6ec}.error{border-color:#a40000;background:#fff0f0}
</style>
</head>
<body>
<h1>Pagamento do evento</h1>
<p><a href="meus-eventos.html">Voltar para Meus Eventos</a></p>
<div id="status" class="msg">Carregando dados do evento...</div>
<div id="conteudo"></div>
<script>
const API='https://audesc-events-api.onrender.com';
const SUPABASE_URL='https://xcmeirgmpbiwodkvuaus.supabase.co';
const SUPABASE_PUBLISHABLE_KEY='sb_publishable_0O38-ahRI_iRA-oyKIaOew_QgWjBpkW';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_PUBLISHABLE_KEY);
const SESSION_MAX_MINUTES=60;
let eventoAtual=null,paddleInicializado=false;
function t(v){return v||'—'}
function setMsg(msg,cls){const el=document.getElementById('status');el.textContent=msg;el.className='msg'+(cls?' '+cls:'')}
function sessionAgeMinutes(session){const raw=session?.user?.last_sign_in_at||session?.created_at||session?.expires_at;if(!raw)return 999999;const base=new Date(raw).getTime();if(!base||Number.isNaN(base))return 999999;return (Date.now()-base)/60000}
async function inicializarPaddle(){if(paddleInicializado)return;const r=await fetch(API+'/pagamentos/paddle/config');const cfg=await r.json();if(!r.ok)throw new Error(cfg.error||'Não foi possível carregar configuração do Paddle.');if(cfg.environment==='sandbox')Paddle.Environment.set('sandbox');Paddle.Initialize({token:cfg.client_token,checkout:{settings:{displayMode:'overlay',theme:'light',locale:'pt'}}});paddleInicializado=true}
async function abrirCheckoutPaddle(transactionId){await inicializarPaddle();Paddle.Checkout.open({transactionId})}
function transactionIdDaUrl(url){try{const u=new URL(url,location.href);return u.searchParams.get('_ptxn')}catch(e){return null}}
async function carregar(){const id=new URLSearchParams(location.search).get('evento');if(!id){setMsg('Evento não informado.','error');return}const {data}=await sb.auth.getSession();const session=data?.session;if(!session||sessionAgeMinutes(session)>SESSION_MAX_MINUTES){await sb.auth.signOut();setMsg('Por segurança, acesse novamente a página Meus Eventos e solicite um novo link de validação.','error');return}try{const r=await fetch(API+'/meus-eventos/'+encodeURIComponent(id),{headers:{'Authorization':'Bearer '+session.access_token}});const data=await r.json();if(!r.ok)throw new Error(data.error||'Erro ao carregar evento.');eventoAtual=data.evento;renderEvento(eventoAtual);setMsg('Confira os dados do evento antes de prosseguir para o pagamento.','');const tx=new URLSearchParams(location.search).get('_ptxn');if(tx){setMsg('Abrindo checkout do Paddle...','');await abrirCheckoutPaddle(tx);history.replaceState({},document.title,'pagamento.html?evento='+encodeURIComponent(id))}}catch(e){setMsg('Erro: '+(e.message||'não foi possível carregar o evento.'),'error')}}
function renderEvento(ev){const pago=ev.status_pagamento==='pago';document.getElementById('conteudo').innerHTML=`<section class="card"><h2>${t(ev.titulo_publicado||ev.titulo_original)}</h2><p><strong>Status do pagamento:</strong> ${t(ev.status_pagamento)}</p><p><strong>Status da publicação:</strong> ${t(ev.status_publicacao)}</p><p><strong>Status da operação:</strong> ${t(ev.status_operacao)}</p><p><strong>Tipo:</strong> ${t(ev.tipo_servico)}</p><p><strong>Data:</strong> ${t(ev.data_evento?new Date(ev.data_evento).toLocaleString('pt-BR'):'')}</p><p><strong>País:</strong> ${t(ev.pais)}</p><p><strong>Unidade administrativa:</strong> ${t(ev.uf)}</p><p><strong>Valor:</strong> definido no checkout internacional do Paddle.</p>${pago?'<p class="msg success">Pagamento já confirmado.</p>':'<button type="button" id="btnPagar">Pagar agora</button>'}</section>`;const btn=document.getElementById('btnPagar');if(btn)btn.onclick=pagar}
async function pagar(){const {data}=await sb.auth.getSession();const session=data?.session;if(!session||sessionAgeMinutes(session)>SESSION_MAX_MINUTES){await sb.auth.signOut();setMsg('Por segurança, acesse novamente Meus Eventos e solicite um novo link antes de pagar.','error');return}setMsg('Criando pagamento seguro no Paddle...','');try{const r=await fetch(API+'/pagamentos/paddle/criar-transacao',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+session.access_token},body:JSON.stringify({evento_id:eventoAtual.id})});const data=await r.json();if(!r.ok)throw new Error(data.error||'Erro ao criar pagamento.');if(data.ja_pago){setMsg('Este evento já está marcado como pago.','success');eventoAtual.status_pagamento='pago';renderEvento(eventoAtual);return}const txId=data.transaction?.id||transactionIdDaUrl(data.checkout_url||data.transaction?.checkout?.url);if(!txId)throw new Error('O Paddle não retornou o identificador da transação.');await abrirCheckoutPaddle(txId)}catch(e){setMsg('Erro ao iniciar pagamento: '+(e.message||'falha desconhecida.'),'error')}}
carregar();
</script>
</body>
</html>
