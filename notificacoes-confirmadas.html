<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Notificações confirmadas — Audesc</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.5;margin:0;background:#f7f7f7;color:#111}header,main{max-width:1000px;margin:0 auto;padding:20px}.panel,.card{background:#fff;border:1px solid #ddd;border-radius:12px;padding:18px;margin-top:16px}label{display:block;font-weight:700;margin-top:12px}input,select,button{font:inherit}input,select{width:100%;box-sizing:border-box;padding:11px;margin-top:6px;border:1px solid #999;border-radius:8px}button,.button-link{display:inline-block;margin:8px 8px 0 0;padding:11px 14px;border:0;border-radius:8px;cursor:pointer;font-weight:700;background:#111;color:#fff;text-decoration:none}.grid{display:grid;gap:12px;grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}.status{margin-top:12px;padding:10px;border-radius:8px;border:1px solid #aaa;background:#f0f0f0}.success{border-color:#237a3b;background:#e8f6ec}.error{border-color:#a40000;background:#fff0f0}.small{font-size:.95rem;color:#444}.badge{display:inline-block;padding:3px 8px;border-radius:999px;background:#eee;margin-right:6px;font-size:.9rem}.live{border-left:8px solid #237a3b}.live-badge{background:#dff6e8;color:#064d20}.past{opacity:.78}.share button{background:#444}.hidden{display:none}</style></head><body><header><a href="eventos.html">Voltar para eventos</a><h1>Confirmação de notificações</h1></header><main><section class="panel"><div id="status" class="status">Validando seu e-mail e ativando notificações...</div><p><a class="button-link" href="eventos.html">Voltar para a página de eventos</a></p></section></main><script>
const API_URL='https://audesc-events-api.onrender.com',SUPABASE_URL='https://xcmeirgmpbiwodkvuaus.supabase.co',SUPABASE_PUBLISHABLE_KEY='sb_publishable_0O38-ahRI_iRA-oyKIaOew_QgWjBpkW';const sb=supabase.createClient(SUPABASE_URL,SUPABASE_PUBLISHABLE_KEY);function set(m,c){const el=document.getElementById('status');el.textContent=m;el.className='status '+(c||'')}async function run(){try{const {data,error}=await sb.auth.getSession();if(error)throw error;if(!data.session){set('Não foi possível identificar a validação. Abra novamente o link recebido por e-mail.','error');return}const r=await fetch(API_URL+'/notificacoes/ativar',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+data.session.access_token}});const j=await r.json();if(!r.ok)throw new Error(j.error);set('Seu e-mail foi validado e suas notificações foram ativadas. Nas próximas alterações de preferência, esse e-mail não precisará de nova confirmação.','success')}catch(e){set('Erro: '+(e.message||'não foi possível ativar notificações.'),'error')}}run();
</script></body></html>
