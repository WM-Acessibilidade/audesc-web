<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Audesc Ao Vivo — Receber</title>
  <link rel="stylesheet" href="live.css">
</head>
<body>
<a class="button-link secondary" href="../index.html" style="margin:16px 16px 0 16px;">Voltar ao Audesc</a>
<header class="topbar">
  <h1>Audesc Ao Vivo</h1>
  <p class="subtitle">Recepção de audiodescrição</p>
</header>

<main class="main">
  <section class="panel">
    <h2>Entrar na sala</h2>
    <div class="grid two">
      <label class="field">
        <span>Código da sala</span>
        <input id="roomCode" type="text" placeholder="Ex.: audesc-abc12">
      </label>
      <label class="field">
        <span>Nome do receptor</span>
        <input id="receiverName" type="text" placeholder="Ex.: Leonardo">
      </label>
    </div>
    <div class="actions">
      <button id="joinBtn" type="button">Entrar</button>
      <button id="leaveBtn" class="secondary" type="button">Sair</button>
    </div>
    <div id="receiverStatus" class="status">Status: aguardando entrada na sala.</div>
  </section>

  <section class="panel">
    <h2>Áudio recebido</h2>
    <audio id="remoteAudio" controls autoplay playsinline></audio>
    <p class="hint">Se o áudio não começar automaticamente, toque em reproduzir.</p>
  </section>

  <section class="panel">
    <h2>Diagnóstico</h2>
    <div id="diagnosticBox" class="status">Biblioteca do LiveKit ainda não carregada.</div>
  </section>
</main>

<script src="livekit-config.js"></script>
<script src="common.js"></script>
<script>
(function() {
  let roomInstance = null;
  const audioEl = document.getElementById('remoteAudio');
  const C = window.AudescLiveCommon;
  const incomingRoom = C.obterSalaDaUrl();
  if (incomingRoom) {
    document.getElementById('roomCode').value = incomingRoom;
  }

  document.getElementById('joinBtn').addEventListener('click', async () => {
    try {
      const LK = await C.carregarLiveKit();
      const roomCode = C.normalizarSala(C.readValue('roomCode')) || 'audesc';
      const receiverName = C.readValue('receiverName') || 'receptor';

      C.setStatus('receiverStatus', 'Status: entrando na sala ' + roomCode + '...', 'warning');
      const tokenData = await C.pedirToken(roomCode, receiverName, 'receiver');

      if (roomInstance) {
        roomInstance.disconnect();
        roomInstance = null;
      }

      roomInstance = await LK.connect(C.livekitUrl, tokenData.token);

      roomInstance.on('trackSubscribed', (track) => {
        if (track.kind === 'audio') {
          const attached = track.attach();
          if (attached.srcObject) {
            audioEl.srcObject = attached.srcObject;
          } else if (attached.src) {
            audioEl.src = attached.src;
          }
          audioEl.play().catch(() => {});
          C.setStatus('receiverStatus', 'Status: conectado à sala ' + roomCode + '. Áudio recebido.', 'success');
        }
      });

      roomInstance.on('disconnected', () => {
        C.setStatus('receiverStatus', 'Status: conexão encerrada.', 'warning');
      });

      C.setStatus('receiverStatus', 'Status: conectado à sala ' + roomCode + '. Aguardando áudio...', 'success');
    } catch (error) {
      C.setStatus('receiverStatus', 'Status: erro ao entrar. ' + (error && error.message ? error.message : 'Falha desconhecida.'), 'warning');
      C.setStatus('diagnosticBox', 'Diagnóstico: ' + (error && error.message ? error.message : 'Falha desconhecida.'), 'warning');
    }
  });

  document.getElementById('leaveBtn').addEventListener('click', () => {
    if (roomInstance) {
      roomInstance.disconnect();
      roomInstance = null;
    }
    audioEl.pause();
    audioEl.removeAttribute('src');
    audioEl.srcObject = null;
    C.setStatus('receiverStatus', 'Status: saída da sala.', 'warning');
  });
})();
</script>
</body>
</html>
