
<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Receber</title>
</head>
<body>

<input id="nome" placeholder="Nome do receptor">
<button id="join">Entrar</button>
<button id="leaveBtn">Sair</button>

<audio id="audio" autoplay playsinline></audio>

<script src="livekit-client.umd.min.js"></script>
<script src="common.js"></script>
<script>

let room, active=false;

window.addEventListener('beforeunload', e=>{
 if(active){ e.preventDefault(); e.returnValue=''; }
});

document.getElementById('join').onclick = async ()=>{
 const nome = document.getElementById('nome').value || "receptor";

 const res = await fetch(CONFIG.token+"?room=teste&identity="+nome+"&role=receiver");
 const data = await res.json();

 room = new LivekitClient.Room();

 room.on("trackSubscribed", async (track)=>{
  if(track.kind==="audio"){
   const audio = document.getElementById("audio");
   const el = track.attach();

   if(el.srcObject) audio.srcObject = el.srcObject;
   else audio.src = el.src;

   try{
    if(room.startAudio) await room.startAudio();
    await audio.play();
   }catch(e){}
  }
 });

 await room.connect(CONFIG.url, data.token);

 active=true;
};

document.getElementById('leaveBtn').onclick = ()=>{
 const ok = confirm("Deseja sair?");
 if(!ok) return;

 if(room) room.disconnect();
 active=false;
};

</script>
</body>
</html>
