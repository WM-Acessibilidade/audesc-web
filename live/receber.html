<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Audesc Ao Vivo — Receber</title>
  <link rel="stylesheet" href="live.css">
</head>
<body>
<a class="button-link secondary" href="../index.html" style="margin:16px 16px 0 16px;">Voltar ao Audesc</a>
<header class="topbar">
  <h1>Audesc Ao Vivo</h1>
  <p class="subtitle">Recepção de audiodescrição</p>
</header>

<main class="main">
  <section class="panel">
    <h2>Entrar na sala</h2>
    <div class="grid two">
      <label class="field">
        <span>Código da sala</span>
        <input id="roomCode" type="text" placeholder="Ex.: audesc-abc12">
      </label>
      <label class="field">
        <span>Nome do receptor</span>
        <input id="receiverName" type="text" placeholder="Ex.: Leonardo">
      </label>
    </div>
    <div class="actions">
      <button id="joinBtn" type="button">Entrar</button>
      <button id="leaveBtn" class="secondary" type="button">Sair</button>
    </div>
    <div id="receiverStatus" class="status">Status: aguardando entrada na sala.</div>
  </section>

  <section class="panel">
    <h2>Áudio recebido</h2>
    <audio id="remoteAudio" controls autoplay playsinline></audio>
    <p class="hint">Se o áudio não começar automaticamente, toque em reproduzir.</p>
  </section>

  <section class="panel">
    <h2>Diagnóstico</h2>
    <div id="diagnosticBox" class="status">Biblioteca do LiveKit ainda não carregada.</div>
  </section>
</main>

<script src="livekit-config.js"></script>
<script>
(function() {
  const cfg = window.AUDESC_CONFIG || {};
  const livekitUrl = cfg.livekitUrl;
  const tokenEndpoint = cfg.tokenEndpoint;
  const bundleUrl = cfg.bundleUrl;

  let roomInstance = null;
  const audioEl = document.getElementById('remoteAudio');

  function setStatus(id, text, tone) {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = text;
    el.className = 'status' + (tone ? ' ' + tone : '');
  }

  function readValue(id) {
    const el = document.getElementById(id);
    return el ? el.value.trim() : '';
  }

  function normalizarSala(nome) {
    return (nome || '').toLowerCase().trim().replace(/\s+/g, '-').replace(/[^a-z0-9_-]/g, '');
  }

  function obterSalaDaUrl() {
    const url = new URL(window.location.href);
    return url.searchParams.get('sala') || '';
  }

  async function pedirToken(room, identity, role) {
    const url = tokenEndpoint + '?room=' + encodeURIComponent(room) + '&identity=' + encodeURIComponent(identity) + '&role=' + encodeURIComponent(role);
    const response = await fetch(url);
    if (!response.ok) throw new Error('Falha ao obter token');
    return response.json();
  }

  function carregarLiveKit() {
    return new Promise((resolve, reject) => {
      if (window.livekit) return resolve(window.livekit);
      const script = document.createElement('script');
      script.src = bundleUrl;
      script.onload = () => {
        if (window.livekit) {
          setStatus('diagnosticBox', 'Biblioteca do LiveKit carregada com sucesso.', 'success');
          resolve(window.livekit);
        } else {
          reject(new Error('Biblioteca carregada sem objeto global'));
        }
      };
      script.onerror = () => reject(new Error('Falha ao carregar biblioteca do LiveKit'));
      document.head.appendChild(script);
    });
  }

  const incomingRoom = obterSalaDaUrl();
  if (incomingRoom) {
    document.getElementById('roomCode').value = incomingRoom;
  }

  document.getElementById('joinBtn').addEventListener('click', async () => {
    try {
      const LK = await carregarLiveKit();
      const roomCode = normalizarSala(readValue('roomCode')) || 'audesc';
      const receiverName = readValue('receiverName') || 'receptor';

      setStatus('receiverStatus', 'Status: entrando na sala ' + roomCode + '...', 'warning');
      const tokenData = await pedirToken(roomCode, receiverName, 'receiver');

      if (roomInstance) {
        roomInstance.disconnect();
        roomInstance = null;
      }

      roomInstance = await LK.connect(livekitUrl, tokenData.token);

      roomInstance.on('trackSubscribed', (track) => {
        if (track.kind === 'audio') {
          const attached = track.attach();
          if (attached.srcObject) {
            audioEl.srcObject = attached.srcObject;
          } else if (attached.src) {
            audioEl.src = attached.src;
          }
          audioEl.play().catch(() => {});
          setStatus('receiverStatus', 'Status: conectado à sala ' + roomCode + '. Áudio recebido.', 'success');
        }
      });

      roomInstance.on('disconnected', () => {
        setStatus('receiverStatus', 'Status: conexão encerrada.', 'warning');
      });

      setStatus('receiverStatus', 'Status: conectado à sala ' + roomCode + '. Aguardando áudio...', 'success');
    } catch (error) {
      setStatus('receiverStatus', 'Status: erro ao entrar. ' + (error && error.message ? error.message : 'Falha desconhecida.'), 'warning');
      setStatus('diagnosticBox', 'Diagnóstico: ' + (error && error.message ? error.message : 'Falha desconhecida.'), 'warning');
    }
  });

  document.getElementById('leaveBtn').addEventListener('click', () => {
    if (roomInstance) {
      roomInstance.disconnect();
      roomInstance = null;
    }
    audioEl.pause();
    audioEl.removeAttribute('src');
    audioEl.srcObject = null;
    setStatus('receiverStatus', 'Status: saída da sala.', 'warning');
  });
})();
</script>
</body>
</html>
