
<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Transmitir</title>
</head>
<body>

<input id="nome" placeholder="Nome do transmissor">
<button id="start">Iniciar</button>
<button id="endBtn">Encerrar</button>

<script src="livekit-client.umd.min.js"></script>
<script src="common.js"></script>
<script>

let room, track, active=false;

window.addEventListener('beforeunload', e=>{
 if(active){ e.preventDefault(); e.returnValue=''; }
});

document.getElementById('start').onclick = async ()=>{
 const nome = document.getElementById('nome').value || "transmissor";

 const res = await fetch(CONFIG.token+"?room=teste&identity="+nome+"&role=transmitter");
 const data = await res.json();

 room = new LivekitClient.Room();

 await room.connect(CONFIG.url, data.token);

 track = await LivekitClient.createLocalAudioTrack();
 await room.localParticipant.publishTrack(track);

 active=true;
 alert("Transmitindo");
};

document.getElementById('endBtn').onclick = ()=>{
 const ok = confirm("Deseja encerrar?");
 if(!ok) return;

 if(track) track.stop();
 if(room) room.disconnect();

 active=false;
};

</script>
</body>
</html>
