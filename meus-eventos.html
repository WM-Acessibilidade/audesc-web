<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Audesc - Meus Eventos</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:Arial,sans-serif;max-width:1000px;margin:0 auto;padding:20px;line-height:1.5}
input,button{padding:10px;font-size:1rem}
button{cursor:pointer;border-radius:8px;border:1px solid #333}
.card{border:1px solid #ccc;border-radius:8px;padding:16px;margin:16px 0;background:#fff}
.status{font-weight:bold}
.msg{padding:12px;border:1px solid #ccc;border-radius:8px;background:#f6f6f6;margin:16px 0}
.success{border-color:#237a3b;background:#e8f6ec}
.error{border-color:#a40000;background:#fff0f0}
.small{font-size:.95rem;color:#444}
.toplink{margin-bottom:16px}
</style>
</head>
<body>
<p class="toplink"><a href="eventos.html">← Voltar para eventos públicos</a></p>

<h1>Meus Eventos</h1>

<section id="loginBox">
<p>Informe seu e-mail para receber um link de acesso aos seus eventos.</p>
<p>Por questão de segurança, clique em Sair ou feche o navegador quando terminar.</p>

<label for="email">E-mail</label><br>
<input id="email" type="email" placeholder="seuemail@exemplo.com" style="width:100%;max-width:420px">
<button id="enviarLink" type="button">Enviar link de acesso</button>

<div id="loginStatus" class="msg">Aguardando e-mail.</div>
</section>

<section id="eventosBox" hidden>
<p id="emailAutenticado" class="msg success"></p>
<button id="sair" type="button">Sair / usar outro e-mail</button>

<div id="status" class="msg">Carregando eventos...</div>
<div id="lista-eventos"></div>
</section>

<script>
const API='https://audesc-events-api.onrender.com';
const SUPABASE_URL='https://xcmeirgmpbiwodkvuaus.supabase.co';
const SUPABASE_PUBLISHABLE_KEY='sb_publishable_0O38-ahRI_iRA-oyKIaOew_QgWjBpkW';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_PUBLISHABLE_KEY);

function t(v){ return v || '—'; }

function setMsg(id,msg,cls){
 const el=document.getElementById(id);
 if(!el) return;
 el.textContent=msg;
 el.className='msg'+(cls?' '+cls:'');
}

function obterEventosOcultos(){
 try{ return JSON.parse(localStorage.getItem('audesc_eventos_ocultos')||'[]'); }
 catch(e){ return []; }
}

function salvarEventosOcultos(lista){
 localStorage.setItem('audesc_eventos_ocultos', JSON.stringify(lista));
}


async function excluirEventoDefinitivamente(eventoId){
 const confirmar=confirm('Esta ação removerá permanentemente o evento pendente do sistema. Deseja continuar?');
 if(!confirmar) return;

 try{
  const {data}=await sb.auth.getSession();
  const session=data?.session;

  if(!session || !session.access_token){
   alert('Sessão inválida. Faça login novamente.');
   return;
  }

  const r=await fetch(API+'/meus-eventos/'+encodeURIComponent(eventoId),{
   method:'DELETE',
   headers:{'Authorization':'Bearer '+session.access_token}
  });

  const resp=await r.json().catch(()=>({}));

  if(!r.ok){
   throw new Error(resp.error||resp.erro||'Falha ao excluir.');
  }

  alert('Evento excluído definitivamente.');
  carregarEventos();

 }catch(e){
  alert('Erro ao excluir evento: '+(e.message||'erro desconhecido.'));
 }
}

function ocultarEventoLocalmente(eventoId){
 const confirmar=confirm('Deseja realmente remover este evento da página Meus Eventos neste navegador? Esta ação não excluirá o evento do sistema, do painel administrativo nem da página pública.');
 if(!confirmar) return;

 const ocultos=obterEventosOcultos();
 if(!ocultos.includes(eventoId)){
  ocultos.push(eventoId);
  salvarEventosOcultos(ocultos);
 }
 carregarEventos();
}

async function enviarLink(){
 const email=document.getElementById('email').value.trim().toLowerCase();

 if(!email || !email.includes('@')){
  setMsg('loginStatus','Informe um e-mail válido.','error');
  return;
 }

 const btn=document.getElementById('enviarLink');
 btn.disabled=true;
 setMsg('loginStatus','Enviando link de acesso...','');

 try{
  const {error}=await sb.auth.signInWithOtp({
   email,
   options:{
    shouldCreateUser:true,
    emailRedirectTo:location.origin+location.pathname
   }
  });

  if(error) throw error;

  setMsg('loginStatus','Link enviado. Abra o e-mail e clique no link para acessar seus eventos. Caso não chegue em três minutos, verifique a caixa de Spam.','success');
 }catch(e){
  setMsg('loginStatus','Erro ao enviar link: '+(e.message||'falha desconhecida.'),'error');
 }finally{
  btn.disabled=false;
 }
}

function mostrarLogin(){
 document.getElementById('loginBox').hidden=false;
 document.getElementById('eventosBox').hidden=true;
}

function mostrarEventos(session){
 document.getElementById('loginBox').hidden=true;
 document.getElementById('eventosBox').hidden=false;
 document.getElementById('emailAutenticado').textContent='E-mail autenticado: '+session.user.email+'. Por questão de segurança, clique em Sair ou feche o navegador quando terminar.';
}

function renderEventos(eventos){
 const ocultos=obterEventosOcultos();
 const visiveis=eventos.filter(ev=>!ocultos.includes(ev.id));

 const pendentes=visiveis.filter(ev=>ev.status_operacao!=='liberado');
 const liberados=visiveis.filter(ev=>ev.status_operacao==='liberado');

 function card(ev){
  return `
  <section class="card">
   <h3>${t(ev.titulo_publicado||ev.titulo_original)}</h3>
   <p class="status">
    Publicação: ${t(ev.status_publicacao)} |
    Pagamento: ${t(ev.status_pagamento)} |
    Operação: ${t(ev.status_operacao)}
   </p>
   <p><strong>Tipo:</strong> ${t(ev.tipo_servico)}</p>
   <p><strong>Data:</strong> ${t(ev.data_evento?new Date(ev.data_evento).toLocaleString('pt-BR'):'')}</p>
   <p><strong>País:</strong> ${t(ev.pais)}</p>
   <p><strong>Unidade administrativa:</strong> ${t(ev.uf)}</p>
   ${ev.sala_codigo?`<p><strong>Sala:</strong> ${t(ev.sala_codigo)}</p>`:''}
   ${ev.senha_transmissor?`<p><strong>Senha do transmissor:</strong> ${t(ev.senha_transmissor)}</p>`:''}
   ${ev.status_pagamento !== 'pago' && ev.tipo_servico === 'audesc_transmissao'
     ? `<p><a href="pagamento.html?evento=${ev.id}"><button type="button">Pagar agora</button></a></p>`
     : ''
   }
   ${ev.status_operacao !== 'liberado'
     ? `<p><button type="button" onclick="excluirEventoDefinitivamente('${ev.id}')">Excluir definitivamente</button></p>`
     : `<p><button type="button" onclick="ocultarEventoLocalmente('${ev.id}')">Ocultar desta página</button></p>`
   }
  </section>`;
 }

 let conteudo='<h2>Pendentes</h2>';
 conteudo+=pendentes.length?pendentes.map(card).join(''):'<p>Nenhum evento pendente.</p>';

 conteudo+='<h2>Liberados</h2>';
 conteudo+=liberados.length?liberados.map(card).join(''):'<p>Nenhum evento liberado.</p>';

 document.getElementById('lista-eventos').innerHTML=conteudo;
}

async function carregarEventos(){
 const {data}=await sb.auth.getSession();
 const session=data?.session;

 if(!session || !session.access_token){
  mostrarLogin();
  return;
 }

 mostrarEventos(session);
 document.getElementById('status').textContent='Carregando eventos...';
 document.getElementById('lista-eventos').innerHTML='';

 try{
  const r=await fetch(API+'/meus-eventos',{
   headers:{'Authorization':'Bearer '+session.access_token}
  });
  const dataEventos=await r.json();

  if(!r.ok) throw new Error(dataEventos.error||dataEventos.erro||'Erro ao carregar eventos.');

  const ocultos=obterEventosOcultos();
  const totalVisiveis=(dataEventos.eventos||[]).filter(ev=>!ocultos.includes(ev.id)).length;

  document.getElementById('status').textContent='Eventos visíveis nesta página: '+totalVisiveis;

  if(!dataEventos.eventos || !dataEventos.eventos.length){
   document.getElementById('lista-eventos').innerHTML='<p>Nenhum evento encontrado para este e-mail.</p>';
   return;
  }

  renderEventos(dataEventos.eventos);
 }catch(e){
  setMsg('status','Erro: '+(e.message||'não foi possível carregar eventos.'),'error');
 }
}

document.getElementById('enviarLink').addEventListener('click', enviarLink);

document.getElementById('sair').addEventListener('click', async()=>{
 await sb.auth.signOut();
 mostrarLogin();
 setMsg('loginStatus','Sessão encerrada. Informe o e-mail para receber novo link.','');
});

carregarEventos();
</script>
</body>
</html>
