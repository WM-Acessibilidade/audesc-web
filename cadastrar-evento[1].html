<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cadastrar evento — Audesc</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.5;margin:0;background:#f7f7f7;color:#111}
header,main{max-width:880px;margin:0 auto;padding:20px}header,.panel{background:#fff}.panel{border:1px solid #ddd;border-radius:12px;padding:20px;margin-top:20px}
label{display:block;font-weight:700;margin-top:16px}input,textarea,select,button{font:inherit}input,textarea,select{width:100%;box-sizing:border-box;padding:12px;margin-top:6px;border:1px solid #999;border-radius:8px;background:#fff;color:#111}
textarea{min-height:140px}.grid{display:grid;gap:16px;grid-template-columns:repeat(auto-fit,minmax(240px,1fr))}button{margin-top:20px;padding:14px 18px;border:0;border-radius:10px;cursor:pointer;font-weight:700;background:#111;color:#fff}button.secondary{background:#555}button[disabled]{opacity:.55}
.status{margin-top:16px;padding:12px;border-radius:8px;border:1px solid #aaa;background:#f0f0f0}.success{border-color:#237a3b;background:#e8f6ec}.error{border-color:#a40000;background:#fff0f0}.hidden{position:absolute;left:-9999px}.step{display:none}.step.active{display:block}
</style></head><body>
<header><a href="index.html">Voltar</a><h1>Cadastrar evento acessível</h1><p>Confirme seu e-mail para liberar o formulário.</p></header>
<main><section class="panel">
<section id="stepEmail" class="step active"><h2>1. Confirmar e-mail</h2><label for="email">E-mail do responsável</label><input id="email" type="email" autocomplete="email"><button id="sendCodeBtn" type="button">Enviar código</button><div id="emailStatus" class="status" role="status" aria-live="polite">Informe o e-mail para receber o código.</div></section>
<section id="stepCode" class="step"><h2>2. Digitar código</h2><label for="code">Código recebido por e-mail</label><input id="code" type="text" inputmode="numeric" autocomplete="one-time-code"><button id="verifyCodeBtn" type="button">Validar código</button><button id="backEmailBtn" class="secondary" type="button">Voltar e alterar e-mail</button><div id="codeStatus" class="status" role="status" aria-live="polite">Aguardando código.</div></section>
<section id="stepForm" class="step"><h2>3. Dados do evento</h2><p id="verifiedEmailInfo"></p>
<form id="eventoForm">
<label for="titulo_original">Nome do evento</label><input id="titulo_original" name="titulo_original" type="text" required maxlength="200">
<label for="descricao_original">Descrição do evento</label><textarea id="descricao_original" name="descricao_original" maxlength="5000"></textarea>
<div class="grid"><div><label for="tipo_servico">Tipo de solicitação</label><select id="tipo_servico" name="tipo_servico"><option value="audesc_transmissao">Contratar transmissão pelo Audesc</option><option value="divulgacao_gratuita">Apenas divulgar evento com audiodescrição</option></select></div><div><label for="tipo_evento">Visibilidade</label><select id="tipo_evento" name="tipo_evento"><option value="publico">Público, com divulgação no Audesc</option><option value="privado">Privado, sem divulgação pública</option></select></div></div>
<div class="grid"><div><label for="data_evento">Data e horário do evento</label><input id="data_evento" name="data_evento" type="datetime-local"></div><div><label for="duracao_horas">Duração em horas</label><select id="duracao_horas" name="duracao_horas"><option value="1">1 hora</option><option value="2" selected>2 horas</option><option value="3">3 horas</option><option value="4">4 horas</option><option value="5">5 horas</option><option value="6">6 horas</option><option value="7">7 horas</option><option value="8">8 horas</option></select></div><div><label for="max_ouvintes">Quantidade máxima de ouvintes</label><select id="max_ouvintes" name="max_ouvintes"><option value="10">10 ouvintes</option><option value="20" selected>20 ouvintes</option><option value="30">30 ouvintes</option><option value="40">40 ouvintes</option><option value="50">50 ouvintes</option><option value="100">100 ouvintes</option></select></div></div>
<h2>Links do evento</h2><label for="site_oficial">Site oficial</label><input id="site_oficial" name="site_oficial" type="url" placeholder="https://"><label for="link_ingressos">Link de ingressos</label><input id="link_ingressos" name="link_ingressos" type="url" placeholder="https://"><label for="link_programacao">Link de programação</label><input id="link_programacao" name="link_programacao" type="url" placeholder="https://"><label for="link_acessibilidade">Link sobre acessibilidade / audiodescrição</label><input id="link_acessibilidade" name="link_acessibilidade" type="url" placeholder="https://">
<div class="hidden" aria-hidden="true"><label for="website">Não preencha</label><input id="website" name="website" type="text" tabindex="-1" autocomplete="off"></div>
<button id="submitBtn" type="submit">Enviar solicitação</button><div id="status" class="status" role="status" aria-live="polite">Aguardando preenchimento.</div></form></section>
</section></main>
<script>
const API_URL='https://audesc-events-api.onrender.com';
const SUPABASE_URL='https://xcmeirgmpbiwodkvuaus.supabase.co';
const SUPABASE_PUBLISHABLE_KEY='sb_publishable_0O38-ahRI_iRA-oyKIaOew_QgWjBpkW';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_PUBLISHABLE_KEY);
let verifiedEmail='', accessToken='';
function showStep(id){document.querySelectorAll('.step').forEach(e=>e.classList.remove('active'));document.getElementById(id).classList.add('active')}
function setStatus(id,t,c){const el=document.getElementById(id);el.textContent=t;el.className='status'+(c?' '+c:'')}
document.getElementById('sendCodeBtn').onclick=async()=>{const email=document.getElementById('email').value.trim();if(!email||!email.includes('@')){setStatus('emailStatus','Informe um e-mail válido.','error');return}document.getElementById('sendCodeBtn').disabled=true;setStatus('emailStatus','Enviando código...','');try{const {error}=await sb.auth.signInWithOtp({email,options:{shouldCreateUser:true}});if(error)throw error;verifiedEmail=email;setStatus('codeStatus','Digite o código enviado para '+email+'.','');showStep('stepCode')}catch(e){setStatus('emailStatus','Erro ao enviar código: '+(e.message||'falha desconhecida.'),'error')}finally{document.getElementById('sendCodeBtn').disabled=false}};
document.getElementById('backEmailBtn').onclick=()=>showStep('stepEmail');
document.getElementById('verifyCodeBtn').onclick=async()=>{const token=document.getElementById('code').value.trim();if(!token){setStatus('codeStatus','Informe o código recebido.','error');return}document.getElementById('verifyCodeBtn').disabled=true;setStatus('codeStatus','Validando código...','');try{const {data,error}=await sb.auth.verifyOtp({email:verifiedEmail,token,type:'email'});if(error)throw error;accessToken=data.session.access_token;document.getElementById('verifiedEmailInfo').textContent='E-mail confirmado: '+verifiedEmail;showStep('stepForm')}catch(e){setStatus('codeStatus','Código inválido ou expirado. '+(e.message||''),'error')}finally{document.getElementById('verifyCodeBtn').disabled=false}};
document.getElementById('eventoForm').onsubmit=async(e)=>{e.preventDefault();if(!accessToken){setStatus('status','Confirme o e-mail antes de enviar.','error');return}const btn=document.getElementById('submitBtn');btn.disabled=true;setStatus('status','Enviando solicitação...','');const data=Object.fromEntries(new FormData(e.currentTarget).entries());if(data.data_evento)data.data_evento=new Date(data.data_evento).toISOString();try{const r=await fetch(API_URL+'/criar-evento',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+accessToken},body:JSON.stringify(data)});const j=await r.json();if(!r.ok)throw new Error(j.error||'Erro ao enviar solicitação.');setStatus('status',j.mensagem||'Solicitação enviada com sucesso.','success');e.currentTarget.reset()}catch(err){setStatus('status','Erro: '+(err.message||'não foi possível enviar.'),'error')}finally{btn.disabled=false}};
</script></body></html>
