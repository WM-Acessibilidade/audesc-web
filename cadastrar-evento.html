<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cadastrar evento — Audesc</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
async function logoutAndResetEmail(){
 try{
  await sb.auth.signOut();
 }catch(e){}

 accessToken='';
 localStorage.removeItem('audesc_verified_email');

 location.reload();
}


</script>
<style>
body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.5;margin:0;background:#f7f7f7;color:#111}
header,main{max-width:900px;margin:0 auto;padding:20px}.panel{background:#fff;border:1px solid #ddd;border-radius:12px;padding:20px;margin-top:20px}
label{display:block;font-weight:700;margin-top:16px}input,textarea,select,button{font:inherit}
input,textarea,select{width:100%;box-sizing:border-box;padding:12px;margin-top:6px;border:1px solid #999;border-radius:8px;background:#fff;color:#111}
textarea{min-height:140px}.grid{display:grid;gap:16px;grid-template-columns:repeat(auto-fit,minmax(240px,1fr))}
button{margin-top:20px;padding:14px 18px;border:0;border-radius:10px;cursor:pointer;font-weight:700;background:#111;color:#fff}
button.secondary{background:#555}button[disabled]{opacity:.55}.status{margin-top:16px;padding:12px;border-radius:8px;border:1px solid #aaa;background:#f0f0f0}
.success{border-color:#237a3b;background:#e8f6ec}.error{border-color:#a40000;background:#fff0f0}.hidden{display:none}
</style>
</head>
<body>
<header>
<a href="eventos.html">Voltar</a>
<h1>Cadastrar evento acessível</h1>
<p>Confirme seu e-mail por link. Por questão de segurança, clique em sair ou feche o navegador quando terminar.
</p>
</header>
<main>
<section class="panel" id="emailStep">
<h2>Confirmar e-mail</h2>
<label for="email">E-mail do responsável</label>
<input id="email" type="email" autocomplete="email" required>
<button id="sendLinkBtn" type="button">Enviar link de validação</button>
<button id="logoutBtn" type="button" class="secondary hidden">Usar outro e-mail</button>
<div id="emailStatus" class="status" role="status" aria-live="polite">Informe o e-mail para receber o link.</div>
</section>

<section class="panel hidden" id="formStep">
<h2>Dados do evento</h2>
<p id="verifiedEmailInfo"></p>
<button id="logoutBtnForm" type="button" class="secondary">Sair / usar outro e-mail</button>
<form id="eventoForm">
<label for="titulo_original">Nome do evento</label>
<input id="titulo_original" name="titulo_original" type="text" required maxlength="200">
<label for="descricao_original">Descrição do evento</label>
<textarea id="descricao_original" name="descricao_original" maxlength="5000"></textarea>

<div class="grid">
<div><label for="tipo_servico">Tipo de solicitação</label><select id="tipo_servico" name="tipo_servico"><option value="audesc_transmissao">Contratar transmissão pelo Audesc</option><option value="divulgacao_gratuita">Apenas divulgar evento com audiodescrição</option></select></div>
<div><label for="tipo_evento">Visibilidade</label><select id="tipo_evento" name="tipo_evento"><option value="publico">Público, com divulgação no Audesc</option><option value="privado">Restrita, sem divulgação pública</option></select></div>
</div>

<div id="acessoOuvintesBox">
<label for="divulgar_acesso_ouvintes">Permitir acesso de ouvintes pela página pública?</label>
<select id="divulgar_acesso_ouvintes" name="divulgar_acesso_ouvintes">
<option value="false" selected>Não</option>
<option value="true">Sim</option>
</select>
</div>

<div class="grid">
<div><label for="data_evento">Data e horário do evento</label><input id="data_evento" name="data_evento" type="datetime-local"></div>
<div id="duracaoBox"><label for="duracao_horas">Duração em horas</label><select id="duracao_horas" name="duracao_horas"><option value="1">1 hora</option><option value="2" selected>2 horas</option><option value="3">3 horas</option><option value="4">4 horas</option><option value="5">5 horas</option><option value="6">6 horas</option><option value="7">7 horas</option><option value="8">8 horas</option></select></div>
<div id="ouvintesBox"><label for="max_ouvintes">Quantidade máxima de ouvintes</label><select id="max_ouvintes" name="max_ouvintes">
<option value="10">10 ouvintes</option>
<option value="20" selected>20 ouvintes</option>
<option value="30">30 ouvintes</option>
<option value="40">40 ouvintes</option>
<option value="60">60 ouvintes</option>
<option value="80">80 ouvintes</option>
<option value="100">100 ouvintes</option>
<option value="120">120 ouvintes</option>
<option value="150">150 ouvintes</option>
<option value="200">200 ouvintes</option>
</select></div>
</div>

<h2>Local do evento</h2>
<div class="grid">
<div><label for="pais">País</label><select id="pais" name="pais">
<option value="Brasil" selected>Brasil</option>
<option value="Angola">Angola</option>
<option value="Cabo Verde">Cabo Verde</option>
<option value="Guiné-Bissau">Guiné-Bissau</option>
<option value="Guiné Equatorial">Guiné Equatorial</option>
<option value="Moçambique">Moçambique</option>
<option value="Portugal">Portugal</option>
<option value="São Tomé e Príncipe">São Tomé e Príncipe</option>
<option value="Timor-Leste">Timor-Leste</option>
<option value="Outros">Outros</option>
</select></div>
<div id="paisOutroBox" class="hidden"><label for="pais_outro">Informe o país</label><input id="pais_outro" name="pais_outro" type="text" maxlength="100"></div>
<div><label for="uf" id="ufLabel">Unidade administrativa</label>
<select id="uf" name="uf">
<option value="">Selecione</option>
</select></div>
</div>

<h2>Links do evento</h2>
<label for="site_oficial">Site oficial</label><input id="site_oficial" name="site_oficial" type="url" placeholder="https://">
<label for="link_ingressos">Link de ingressos</label><input id="link_ingressos" name="link_ingressos" type="url" placeholder="https://">
<label for="link_programacao">Link de programação</label><input id="link_programacao" name="link_programacao" type="url" placeholder="https://">
<label for="link_acessibilidade">Link sobre acessibilidade / audiodescrição</label><input id="link_acessibilidade" name="link_acessibilidade" type="url" placeholder="https://">
<div class="hidden" aria-hidden="true"><label for="website">Não preencha</label><input id="website" name="website" type="text" tabindex="-1" autocomplete="off"></div>
<button id="submitBtn" type="submit">Enviar solicitação</button>
<div id="status" class="status" role="status" aria-live="polite">Aguardando preenchimento.</div>
</form>
</section>
</main>

<script>
const API_URL='https://audesc-events-api.onrender.com';
const SUPABASE_URL='https://xcmeirgmpbiwodkvuaus.supabase.co';
const SUPABASE_PUBLISHABLE_KEY='sb_publishable_0O38-ahRI_iRA-oyKIaOew_QgWjBpkW';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_PUBLISHABLE_KEY);
const SESSION_MAX_MINUTES=null;
let accessToken='';

function setStatus(id,text,cls){const el=document.getElementById(id);el.textContent=text;el.className='status'+(cls?' '+cls:'')}
function showEmailStep(msg,cls){document.getElementById('emailStep').classList.remove('hidden');document.getElementById('formStep').classList.add('hidden');if(msg)setStatus('emailStatus',msg,cls||'')}
function showForm(email){document.getElementById('emailStep').classList.add('hidden');document.getElementById('formStep').classList.remove('hidden');document.getElementById('verifiedEmailInfo').textContent='E-mail confirmado: '+(email||'')+'. Por questão de segurança, clique em sair ou feche o navegador quando terminar.'}
function sessionAgeMinutes(session){const raw=session?.user?.last_sign_in_at||session?.created_at||session?.expires_at;if(!raw)return 999999;const base=new Date(raw).getTime();if(!base||Number.isNaN(base))return 999999;return (Date.now()-base)/60000}

async function checkSession(){
 const {data}=await sb.auth.getSession();
 const session=data?.session;
 if(!session){showEmailStep('Informe o e-mail para receber o link de validação.','');return}
 accessToken=session.access_token;
 showForm(session.user.email);
}

document.getElementById('logoutBtn').onclick=async()=>{await sb.auth.signOut();accessToken='';document.getElementById('logoutBtn').classList.add('hidden');showEmailStep('Sessão encerrada. Informe o e-mail que deseja validar.','')};

document.getElementById('sendLinkBtn').onclick=async()=>{
 const email=document.getElementById('email').value.trim();
 if(!email||!email.includes('@')){setStatus('emailStatus','Informe um e-mail válido.','error');return}
 document.getElementById('sendLinkBtn').disabled=true;setStatus('emailStatus','Enviando link de validação...','');
 try{
  const {error}=await sb.auth.signInWithOtp({email,options:{shouldCreateUser:true,emailRedirectTo:location.origin+location.pathname}});
  if(error)throw error;
  setStatus('emailStatus','Link de validação enviado. Abra o e-mail e clique no link para continuar. Caso o e-mail não chegue em um prazo de três minutos, verifique sua caixa de Spam antes de realizar uma nova solicitação.','success');
 }catch(e){setStatus('emailStatus','Erro ao enviar link: '+(e.message||'falha desconhecida.'),'error')}
 finally{document.getElementById('sendLinkBtn').disabled=false}
};

const paisSelect=document.getElementById('pais'),ufSelect=document.getElementById('uf'),paisOutroBox=document.getElementById('paisOutroBox'),paisOutroInput=document.getElementById('pais_outro');
const unidadesAdministrativas = {
 Brasil: {
  rotulo: 'Unidade federativa',
  padrao: 'DF',
  opcoes: [
   ['AC','Acre'],['AL','Alagoas'],['AP','Amapá'],['AM','Amazonas'],['BA','Bahia'],['CE','Ceará'],['DF','Distrito Federal'],['ES','Espírito Santo'],['GO','Goiás'],['MA','Maranhão'],['MT','Mato Grosso'],['MS','Mato Grosso do Sul'],['MG','Minas Gerais'],['PA','Pará'],['PB','Paraíba'],['PR','Paraná'],['PE','Pernambuco'],['PI','Piauí'],['RJ','Rio de Janeiro'],['RN','Rio Grande do Norte'],['RS','Rio Grande do Sul'],['RO','Rondônia'],['RR','Roraima'],['SC','Santa Catarina'],['SP','São Paulo'],['SE','Sergipe'],['TO','Tocantins']
  ]
 },
 Angola: {
  rotulo: 'Província',
  padrao: '',
  opcoes: ['Bengo','Benguela','Bié','Cabinda','Cuando Cubango','Cuanza Norte','Cuanza Sul','Cunene','Huambo','Huíla','Luanda','Lunda Norte','Lunda Sul','Malanje','Moxico','Namibe','Uíge','Zaire']
 },
 'Cabo Verde': {
  rotulo: 'Ilha',
  padrao: '',
  opcoes: ['Boa Vista','Brava','Fogo','Maio','Sal','Santiago','Santo Antão','São Nicolau','São Vicente']
 },
 'Guiné-Bissau': {
  rotulo: 'Região',
  padrao: '',
  opcoes: ['Bafatá','Biombo','Bolama/Bijagós','Cacheu','Gabú','Oio','Quinara','Tombali','Setor Autônomo de Bissau']
 },
 'Guiné Equatorial': {
  rotulo: 'Província',
  padrao: '',
  opcoes: ['Annobón','Bioko Norte','Bioko Sul','Centro Sul','Djibloho','Kie-Ntem','Litoral','Wele-Nzas']
 },
 Moçambique: {
  rotulo: 'Província',
  padrao: '',
  opcoes: ['Cabo Delgado','Gaza','Inhambane','Manica','Maputo','Maputo Cidade','Nampula','Niassa','Sofala','Tete','Zambézia']
 },
 Portugal: {
  rotulo: 'Distrito ou região autônoma',
  padrao: '',
  opcoes: ['Aveiro','Beja','Braga','Bragança','Castelo Branco','Coimbra','Évora','Faro','Guarda','Leiria','Lisboa','Portalegre','Porto','Santarém','Setúbal','Viana do Castelo','Vila Real','Viseu','Açores','Madeira']
 },
 'São Tomé e Príncipe': {
  rotulo: 'Distrito ou região autônoma',
  padrao: '',
  opcoes: ['Água Grande','Cantagalo','Caué','Lembá','Lobata','Mé-Zóchi','Região Autônoma do Príncipe']
 },
 'Timor-Leste': {
  rotulo: 'Município ou região administrativa especial',
  padrao: '',
  opcoes: ['Aileu','Ainaro','Ataúro','Baucau','Bobonaro','Covalima','Díli','Ermera','Lautém','Liquiçá','Manatuto','Manufahi','Oecusse','Viqueque']
 }
};

function criarOpcao(valor, texto){
 const opt=document.createElement('option');
 opt.value=valor;
 opt.textContent=texto || valor;
 return opt;
}

function atualizarLocalizacao(){
 const pais = paisSelect.value;
 const dados = unidadesAdministrativas[pais];
 const label = document.getElementById('ufLabel');

 ufSelect.innerHTML = '';
 ufSelect.appendChild(criarOpcao('', 'Selecione'));

 if(dados){
  label.textContent = dados.rotulo;
  dados.opcoes.forEach(item=>{
   let valor = '';
   let texto = '';

   if(Array.isArray(item)){
    valor = item[0];
    texto = item[1] + ' (' + item[0] + ')';
   }else{
    valor = item;
    texto = item;
   }

   ufSelect.appendChild(criarOpcao(valor, texto));
  });
  ufSelect.disabled=false;
  ufSelect.value=dados.padrao || '';
 }else{
  label.textContent = 'Unidade administrativa';
  ufSelect.value='';
  ufSelect.disabled=true;
 }

 if(paisOutroBox) paisOutroBox.classList.add('hidden');
 if(paisOutroInput){ paisOutroInput.required=false; paisOutroInput.value=''; }
}
paisSelect.addEventListener('change',atualizarLocalizacao);atualizarLocalizacao();

document.getElementById('eventoForm').onsubmit=async(e)=>{
 e.preventDefault();
 const form=e.target;
 const {data:sessionData}=await sb.auth.getSession();
 const session=sessionData?.session;
 if(!session){accessToken='';await sb.auth.signOut();showEmailStep('Sessão não encontrada. Confirme novamente seu e-mail antes de enviar o evento.','error');return}
 accessToken=session.access_token;
 const btn=document.getElementById('submitBtn');btn.disabled=true;setStatus('status','Enviando solicitação...','');
 const data=Object.fromEntries(new FormData(form).entries());
 if(data.pais!=='Outros'&&!data.uf){setStatus('status','Selecione a unidade administrativa.','error');btn.disabled=false;return}
 
 if(data.tipo_servico === 'divulgacao_gratuita'){
  delete data.duracao_horas;
  delete data.max_ouvintes;
  data.divulgar_acesso_ouvintes = false;
 }
 if(data.divulgar_acesso_ouvintes === 'true') data.divulgar_acesso_ouvintes = true;
 else data.divulgar_acesso_ouvintes = false;
 if(data.data_evento)data.data_evento=new Date(data.data_evento).toISOString();
 try{
  const r=await fetch(API_URL+'/criar-evento',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+accessToken},body:JSON.stringify(data)});
  const j=await r.json();if(!r.ok)throw new Error(j.error||'Erro ao enviar solicitação.');
  if(data.tipo_servico === 'divulgacao_gratuita'){
   setStatus('status','Evento recebido e enviado para curadoria antes da publicação.','success');
  }else{
   setStatus('status','Evento recebido e enviado para curadoria antes da publicação. Em breve você receberá um e-mail com informações de pagamento e instruções de acesso.','success');
  }
  form.reset();atualizarLocalizacao();
 }catch(err){setStatus('status','Erro: '+(err.message||'não foi possível enviar.'),'error')}
 finally{btn.disabled=false}
};

const tipoServico = document.getElementById('tipo_servico');
const tipoEvento = document.getElementById('tipo_evento');
const acessoOuvintesBox = document.getElementById('acessoOuvintesBox');
const divulgarAcessoOuvintes = document.getElementById('divulgar_acesso_ouvintes');

function ajustarVisibilidade(){
 const opcaoRestrita = tipoEvento.querySelector('option[value="privado"]');
 const duracaoBox = document.getElementById('duracaoBox');
 const ouvintesBox = document.getElementById('ouvintesBox');
 const duracao = document.getElementById('duracao_horas');
 const ouvintes = document.getElementById('max_ouvintes');

 if(tipoServico.value === 'divulgacao_gratuita'){
  tipoEvento.value = 'publico';
  opcaoRestrita.disabled = true;

  duracaoBox.classList.add('hidden');
  ouvintesBox.classList.add('hidden');

  duracao.disabled = true;
  ouvintes.disabled = true;

  if(acessoOuvintesBox) acessoOuvintesBox.classList.add('hidden');
  if(divulgarAcessoOuvintes){ divulgarAcessoOuvintes.value='false'; divulgarAcessoOuvintes.disabled=true; }
 } else {
  opcaoRestrita.disabled = false;

  duracaoBox.classList.remove('hidden');
  ouvintesBox.classList.remove('hidden');

  duracao.disabled = false;
  ouvintes.disabled = false;

  if(acessoOuvintesBox) acessoOuvintesBox.classList.remove('hidden');
  if(divulgarAcessoOuvintes) divulgarAcessoOuvintes.disabled=false;

  if(!duracao.value) duracao.value = '2';
  if(!ouvintes.value) ouvintes.value = '20';
 }
}

tipoServico.addEventListener('change', ajustarVisibilidade);
ajustarVisibilidade();


const logoutBtnForm = document.getElementById('logoutBtnForm');
if(logoutBtnForm){
 logoutBtnForm.addEventListener('click', logoutAndResetEmail);
}

checkSession();

async function logoutAndResetEmail(){
 try{
  await sb.auth.signOut();
 }catch(e){}

 accessToken='';
 localStorage.removeItem('audesc_verified_email');

 location.reload();
}


</script>
</body>
</html>
